# =====================================================================
# LOCAL profile (committed). Non-secret literals are inline;
# secrets are ${ENV_VAR} placeholders resolved from config/secrets.local.
# =====================================================================

frontend:                                  # PUBLIC values compiled into the web app
  apiBaseUrl: "http://localhost:3000/api"  # dev API runs on a separate port
  googleOAuthClientId: ${GOOGLE_OAUTH_CLIENT_ID}
  inactiveTimeout: ${INACTIVE_TIMEOUT:960}   # auto sign-out after N idle seconds
  vapidPublicKey: ${VAPID_PUBLIC_KEY}      # Web Push public key (safe to ship)

backend:                                   # SECRET values, server-side only
  tursoDatabaseUrl: ${TURSO_DATABASE_URL}
  tursoAuthToken: ${TURSO_AUTH_TOKEN}
  sessionSecret: ${SESSION_SECRET}
  fileStorageToken: ${BLOB_READ_WRITE_TOKEN}        # Vercel Blob token (QR/menu images)
  gmailUser: ${GMAIL_USER}                          # Gmail address that sends order-reminder email
  gmailAppPassword: ${GMAIL_APP_PASSWORD}           # Gmail App Password (2FA required; no domain to buy)
  vapidPublicKey: ${VAPID_PUBLIC_KEY}               # also needed server-side by web-push
  vapidPrivateKey: ${VAPID_PRIVATE_KEY}             # Web Push private key
  vapidSubject: "mailto:reminders@makankira.app"    # Web Push contact (non-secret)
  cronSecret: ${CRON_SECRET}                        # protects the reminder cron endpoint
