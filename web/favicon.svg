<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00C259"/>
      <stop offset="0.55" stop-color="#00B14F"/>
      <stop offset="1" stop-color="#00713A"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB020"/>
      <stop offset="1" stop-color="#E08A00"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="128" fill="url(#g)"/>

  <!-- steam -->
  <g fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" opacity="0.9">
    <path d="M212 210 c -16 -20 -16 -38 0 -58 c 16 -20 16 -38 0 -58"/>
    <path d="M256 214 c -16 -20 -16 -38 0 -58 c 16 -20 16 -38 0 -58"/>
    <path d="M300 210 c -16 -20 -16 -38 0 -58 c 16 -20 16 -38 0 -58"/>
  </g>

  <!-- bowl -->
  <path d="M110 250 A146 150 0 0 0 402 250 Z" fill="#ffffff"/>
  <ellipse cx="256" cy="250" rx="146" ry="30" fill="#E7FBEF"/>
  <ellipse cx="256" cy="250" rx="146" ry="30" fill="none" stroke="#ffffff" stroke-width="7"/>

  <!-- RM coin -->
  <g>
    <circle cx="396" cy="398" r="80" fill="url(#coin)"/>
    <circle cx="396" cy="398" r="80" fill="none" stroke="#ffffff" stroke-width="12"/>
    <text x="396" y="402" text-anchor="middle" dominant-baseline="central"
          font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="58" fill="#ffffff">RM</text>
  </g>
</svg>
