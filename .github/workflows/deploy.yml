name: Deploy to Vercel

# Builds the Flutter web UI + TypeScript /api and deploys to Vercel.
# - push to master  -> production
# - pull request     -> staging / preview
# All values come from GitHub repository secrets (README Section 15).

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_PROFILE: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
      # --- public (frontend build) values ---
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
      INACTIVE_TIMEOUT: ${{ vars.INACTIVE_TIMEOUT }}    # non-secret Actions variable; blank -> 960 default

      # --- secret (backend / runtime) values ---
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # --- Vercel deploy credentials (GitHub-only) ---
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install JS dependencies
        run: npm ci

      # Fail fast if the /api TypeScript is broken. With NodeNext resolution this
      # also enforces explicit .js extensions on relative imports — the Vercel
      # function is native ESM, so a missing extension crashes every route at
      # cold start (FUNCTION_INVOCATION_FAILED). esbuild transpiles without
      # type-checking, so this step is the only thing that catches it pre-deploy.
      - name: Typecheck the API
        run: npm run typecheck

      - name: Resolve profile config (writes config/frontend.$APP_PROFILE.json)
        run: npm run config

      - name: Run database migrations against the target Turso DB
        run: npm run migrate

      - name: Build Flutter web (public config only)
        run: |
          flutter pub get
          flutter build web --release --dart-define-from-file=config/frontend.${APP_PROFILE}.json

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/master' && 'production' || 'preview' }} --token "$VERCEL_TOKEN"

      - name: Sync runtime secrets to Vercel
        run: node scripts/sync-vercel-env.mjs

      - name: Vercel build (api functions + static web)
        run: vercel build ${{ github.ref == 'refs/heads/master' && '--prod' || '' }} --token "$VERCEL_TOKEN"

      - name: Deploy to Vercel (prebuilt)
        run: vercel deploy --prebuilt ${{ github.ref == 'refs/heads/master' && '--prod' || '' }} --token "$VERCEL_TOKEN"
